{{ if .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "prometheus.fullname" . }}
  labels:
    {{- include "prometheus.labels" . | nindent 4 }}
  annotations:
    {{- $annotations := merge (include "prometheus.commonAnnotations" . | fromYaml) .Values.prometheus.config.annotations }}
    {{- toYaml $annotations | nindent 4 }}
data:
  prometheus.yml: |-
    {{- with .Values.prometheus.config }}
    global:
      scrape_interval: {{ quote .scrapeInterval }}
      scrape_timeout: {{ quote .scrapeTimeout }}
    scrape_configs:
    - job_name: kubelet
      honor_timestamps: true
      metrics_path: /metrics/resource
      scheme: https
      follow_redirects: true
      tls_config:
        insecure_skip_verify: true
      authorization:
        credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      kubernetes_sd_configs:
        - role: node
      #relabel_configs:
      #  - action: labeldrop
      #    # instance label cannot be dropped
      #    regex: job
      metric_relabel_configs:
        {{- if .series }}
        - action: keep
          source_labels: ['__name__']
          regex: {{ join "|" .series }}
        {{- end }}
        {{- if .namespaces }}
        - action: keep
          source_labels: ['namespace']
          #regex: default|kubelet-scraper
          {{- if .includeOwnNamespace }}
          regex: {{ append .namespaces $.Release.Namespace | join "|" }}
          {{- else }}
          regex: {{ join "|" .namespaces }}
          {{- end }}
        {{- end }}
    {{- if .scrape_cadvisor }}
    - job_name: kubelet_cadvisor
      honor_timestamps: true
      metrics_path: /metrics/cadvisor
      scheme: https
      follow_redirects: true
      tls_config:
        insecure_skip_verify: true
      authorization:
        credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      kubernetes_sd_configs:
        - role: node
    {{- end }}
    {{- if .scrape_probes }}
    - job_name: kubelet_probes
      honor_timestamps: true
      metrics_path: /metrics/probes
      scheme: https
      follow_redirects: true
      tls_config:
        insecure_skip_verify: true
      authorization:
        credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      kubernetes_sd_configs:
        - role: node
    {{- end }}
    {{- end }}
  web.yml: |-
    tls_server_config:
      cert_file: /etc/prometheus/prom.pem
      key_file: /etc/prometheus/prom.key
  ca.pem: |
    {{- if .Values.global.certs.useFiles -}}
    {{ .Files.Get .Values.global.certs.ca_cert | nindent 4 }}
    {{- else -}}
    {{ .Values.global.certs.ca_cert | nindent 4 }}
    {{- end }}
{{ end }}
