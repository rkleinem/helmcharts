apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "prometheus.fullname" . }}
  labels:
    {{- include "prometheus.labels" . | nindent 4 }}
  annotations:
    {{- (include "prometheus.commonAnnotations" .) | nindent 4 }}
rules:
- apiGroups: [""]
  resources:
  - nodes
  - nodes/metrics
  - nodes/stats
  #- nodes/proxy
  #- nodes/spec
  #- nodes/log
  verbs:
  - 'get'
  - 'list'
  - 'watch'
