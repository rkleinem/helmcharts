apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "collector.clusterRoleName" . }}
  labels:
    {{- include "collector.labels" . | nindent 4 }}
  annotations: 
    {{- (include "collector.commonAnnotations" .) | nindent 4 }}
rules:
- apiGroups: [""]
  resources:
    - pods
  verbs:
    - 'get'
    - 'list'
